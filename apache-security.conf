# ============================================================
# AppLabX WordPress Base — Apache Security & Performance
# ============================================================
# Applied via IncludeOptional in httpd.conf.
# Compatible with Apache 2.4 on the official wordpress image.
#
# Changes here take effect on every container start.
# No rebuild required after editing (bind-mount the conf dir
# or override via environment in docker-compose).
# ============================================================

# ── Server identity ────────────────────────────────────────

# Remove the Server: header entirely.
# The default WordPress Apache build includes ServerTokens Full,
# which leaks Apache version, OS, and loaded modules.
ServerTokens Prod

# Suppress the server version on error pages and DirectoryIndex
# listings.  Does NOT remove the Server: header (see above).
ServerSignature Off

# ── Request methods ────────────────────────────────────────

# Block HTTP methods that are never needed by WordPress.
# TRACE and TRACK enable XST (Cross-Site Tracing) attacks.
<LimitExcept GET POST HEAD>
    Require all denied
</LimitExcept>

# Explicitly block TRACE method at the protocol level.
# Some load balancers strip this header; we enforce it anyway.
RewriteEngine On
RewriteCond %{REQUEST_METHOD} ^TRACE
RewriteRule .* - [F]

# ── Compression ─────────────────────────────────────────────

# Enable mod_deflate for text-based assets.
# This is a significant performance win (60–80 % size reduction
# on HTML/JSON/CSS/JS) and is safe for all browsers.
<IfModule mod_deflate.c>
    AddOutputFilterByType DEFLATE \
        application/javascript \
        application/json \
        application/rss+xml \
        application/vnd.ms-fontobject \
        application/x-font \
        application/x-font-opentype \
        application/x-font-otf \
        application/x-font-truetype \
        application/x-font-ttf \
        application/x-web-app-manifest+json \
        application/xhtml+xml \
        application/xml \
        font/eot \
        font/opentype \
        font/otf \
        font/ttf \
        image/svg+xml \
        image/x-icon \
        text/css \
        text/html \
        text/plain \
        text/xml
</IfModule>

# ── Browser caching ────────────────────────────────────────

# Cache static assets aggressively to reduce server load and
# improve Time to First Byte for return visitors.
<IfModule mod_expires.c>
    ExpiresActive On

    # Default: 1 week for most assets
    ExpiresDefault "access plus 1 week"

    # HTML — no cache (must be fresh for auth / personalised content)
    ExpiresByType text/html "access plus 0 seconds"

    # Images
    ExpiresByType image/gif             "access plus 1 month"
    ExpiresByType image/png             "access plus 1 month"
    ExpiresByType image/jpeg            "access plus 1 month"
    ExpiresByType image/webp            "access plus 1 month"
    ExpiresByType image/svg+xml         "access plus 1 month"
    ExpiresByType image/x-icon          "access plus 1 year"

    # Fonts
    ExpiresByType font/ttf              "access plus 1 month"
    ExpiresByType font/otf              "access plus 1 month"
    ExpiresByType font/woff             "access plus 1 month"
    ExpiresByType font/woff2            "access plus 1 year"

    # CSS / JS
    ExpiresByType text/css              "access plus 1 week"
    ExpiresByType application/javascript "access plus 1 week"
    ExpiresByType text/javascript       "access plus 1 week"

    # Media
    ExpiresByType video/mp4             "access plus 1 month"
    ExpiresByType video/webm           "access plus 1 month"
    ExpiresByType audio/mpeg            "access plus 1 month"
</IfModule>

# ── Security headers ───────────────────────────────────────

# These headers are applied site-wide and are safe for WordPress.
# They are NOT set inside wp-admin (where some can break the
# admin UI) — see the <LocationMatch> block below.

<IfModule mod_headers.c>
    # Prevent MIME-type sniffing (XSS via content-type confusion).
    X-Content-Type-Options: nosniff

    # Prevent the page from being embedded in an iframe (clickjacking).
    # Apps that legitimately need embedding (e.g. a WP site embedded
    # in an approved partner iframe) can override this header per-route.
    X-Frame-Options: SAMEORIGIN

    # Enable the browser's XSS filter (last resort, CSP is preferred).
    X-XSS-Protection: 1; mode=block

    # Referrer-Policy: don't leak referrer to untrusted destinations.
    Referrer-Policy: strict-origin-when-cross-origin

    # Permissions-Policy: disable unnecessary browser features.
    # Adjust to taste for your deployment.
    Permissions-Policy: camera=(), microphone=(), geolocation=()

    # HSTS — tell browsers to only connect via HTTPS.
    # Uncomment once you have confirmed HTTPS works end-to-end.
    # Include subdomains and preload flags only after 30+ days
    # of clean HSTS operation.
    # Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"

    # Content-Security-Policy — a strict policy for WordPress.
    # This is a starting point; audit your plugins' inline scripts
    # and styles before hardening further.
    # Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'self'; base-uri 'self'; form-action 'self';"

    # Remove the X-Powered-By header (redundant with ServerTokens).
    Header unset X-Powered-By
</IfModule>

# ── Admin area — relaxed security for wp-admin ─────────────

# The strict CSP above would break the WordPress admin dashboard
# (it uses inline styles and scripts extensively).  We revert
# to sensible defaults inside /wp-admin/.
<LocationMatch "^/(wp-admin|wp-login\.php)">
    <IfModule mod_headers.c>
        # Keep clickjacking protection off inside admin (WP admin
        # uses iframes for media library, visual builders, etc.).
        Header set X-Frame-Options "SAMEORIGIN" "expr=%{CONTEXT_PROTOCOL} == 'https' ? 'SAMEORIGIN' : 'DENY'"

        # Admin must be served over HTTPS; enforce it here.
        # Uncomment once HTTPS is confirmed working.
        # RequestHeader set X-Forwarded-Proto "https" early

        # Relax CSP for the admin area only (allow inline styles
        # needed by the WP admin UI and popular plugins).
        Header set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'self';"
    </IfModule>
</LocationMatch>

# ── Prevent access to sensitive files ──────────────────────

# Deny direct access to the entrypoint script and any file
# starting with .ht (which Apache protects but other webservers
# behind this container might not).
<FilesMatch "^\.ht">
    Require all denied
</FilesMatch>

# ── KeepAlive ───────────────────────────────────────────────

# Allow persistent connections to reduce TCP handshake overhead.
# Values are conservative to avoid exhausting Apache workers.
KeepAlive On
MaxKeepAliveRequests 100
KeepAliveTimeout 5

# ── Symlink protection ────────────────────────────────────

# Prevent following symlinks outside the DocumentRoot, which
# could expose sensitive files if a plugin/theme creates
# insecure symlinks.
<IfModule mod_authz_core.c>
    Require all granted
</IfModule>
Options -FollowSymLinks -SymLinksIfOwnerMatch

# ── Directory listing ──────────────────────────────────────

# Explicitly disable directory listing.  WordPress handles all
# routing; there should be no raw directory exposed.
<Directory "/var/www/html">
    Options -Indexes
</Directory>
