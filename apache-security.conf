# ============================================================
# AppLabX WordPress Base — Apache Security & Performance
# ============================================================
# Applied via IncludeOptional in httpd.conf (appended at build time).
# Compatible with Apache 2.4 on the official wordpress:php8.3-apache image.
#
# mod_rewrite, mod_headers, mod_expires, mod_deflate, mod_filter
# are explicitly enabled via a2enmod in the Dockerfile.
#
# Changes to this file take effect on container restart.
# For runtime overrides without rebuild, bind-mount this file or
# mount a custom conf file at the same path in docker-compose.
# ============================================================

# ── Server identity ────────────────────────────────────────

# Remove version and OS info from Server: header.
# Default (Full) leaks Apache version, OS, and loaded modules.
ServerTokens Prod

# Suppress server version on error pages and directory indexes.
# (ServerTokens removes the header entirely; this suppresses
# the version string where it still appears.)
ServerSignature Off

# ── HTTP method restrictions ────────────────────────────────

# Block HTTP methods that WordPress never uses.
# TRACE and TRACK enable Cross-Site Tracing (XST) attacks.
# OPTIONS is used for CORS preflight — allow it.
# DELETE, PUT, PATCH are never issued by WP browser clients.
<Directory "/var/www/html">
    <LimitExcept GET POST HEAD OPTIONS>
        Require all denied
    </LimitExcept>
</Directory>

# ── Compression ─────────────────────────────────────────────

# gzip/brotli compression for text-based assets.
# Typical size reduction: 60–80 % on HTML, CSS, JS, JSON.
# Safe for all browsers (all modern browsers support gzip).
<IfModule mod_deflate.c>
    # Force compression for browsers that misdeclare support
    SetOutputFilter DEFLATE

    # Exclude compression for browsers that don't support it
    BrowserMatch ^Mozilla/4 gzip-only-text/html
    BrowserMatch ^Mozilla/4\.0[678] no-gzip
    BrowserMatch \bMSIE !no-gzip !gzip-only-text/html

    # Do not compress images, video, audio — already compressed
    SetEnvIfNoCase Request_URI \
        \.(gif|jpe?g|png|webp|ico|flv|mp4|mov|avi|mp3|ogg|woff2?)$ \
        no-gzip vary

    AddOutputFilterByType DEFLATE \
        text/plain \
        text/html \
        text/xml \
        text/css \
        text/javascript \
        application/javascript \
        application/json \
        application/rss+xml \
        application/atom+xml \
        application/xml \
        application/xhtml+xml \
        application/x-web-app-manifest+json \
        application/vnd.ms-fontobject \
        application/x-font-ttf \
        application/x-font-opentype \
        image/svg+xml
</IfModule>

# ── Browser caching ─────────────────────────────────────────

# Cache static assets aggressively to reduce server load and
# improve Time to First Byte for return visitors.
# WordPress handles cache headers for dynamic pages; this only
# affects static files (images, fonts, CSS, JS, media).
<IfModule mod_expires.c>
    ExpiresActive On

    # Default fallback: 1 week for unspecified assets
    ExpiresDefault "access plus 1 week"

    # HTML — never cache (auth state, personalised content)
    ExpiresByType text/html "access plus 0 seconds"

    # Images
    ExpiresByType image/gif             "access plus 1 month"
    ExpiresByType image/png             "access plus 1 month"
    ExpiresByType image/jpeg           "access plus 1 month"
    ExpiresByType image/webp           "access plus 1 month"
    ExpiresByType image/svg+xml        "access plus 1 month"
    ExpiresByType image/x-icon         "access plus 1 year"

    # Fonts
    ExpiresByType font/ttf             "access plus 1 month"
    ExpiresByType font/otf             "access plus 1 month"
    ExpiresByType font/woff            "access plus 1 month"
    ExpiresByType font/woff2           "access plus 1 year"

    # Stylesheets and JavaScript
    ExpiresByType text/css             "access plus 1 week"
    ExpiresByType application/javascript "access plus 1 week"
    ExpiresByType text/javascript      "access plus 1 week"

    # Media
    ExpiresByType video/mp4            "access plus 1 month"
    ExpiresByType video/webm           "access plus 1 month"
    ExpiresByType audio/mpeg           "access plus 1 month"
</IfModule>

# ── Security headers ────────────────────────────────────────

# Applied site-wide. wp-admin/ relaxations are in the
# <LocationMatch> block further down.
<IfModule mod_headers.c>
    # Prevent MIME-type sniffing (XSS via content-type confusion).
    Header set X-Content-Type-Options "nosniff"

    # Prevent clickjacking. SAMEORIGIN allows embedding in iframes
    # on the same domain (WP admin media library, visual builders).
    Header set X-Frame-Options "SAMEORIGIN"

    # Legacy XSS filter (harmless; modern browsers use CSP instead).
    # Kept for older browsers that don't honour CSP.
    Header set X-XSS-Protection "1; mode=block"

    # Control referrer leakage to external sites.
    # strict-origin-when-cross-origin: send full URL internally,
    # origin-only for cross-origin, nothing for file:// and https→http.
    Header set Referrer-Policy "strict-origin-when-cross-origin"

    # Disable unnecessary browser features (camera, mic, geolocation).
    # Downstream projects can relax this if needed.
    Header set Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()"

    # Remove the server's X-Powered-By header (redundant with ServerTokens).
    Header unset X-Powered-By
</IfModule>

# ── HSTS (disabled by default) ─────────────────────────────
# Uncomment ONLY after you have confirmed HTTPS works end-to-end.
# Adding subdomains or preload prematurely can lock out users.
# Wait at least 30 days of clean HSTS operation before adding those.
# <IfModule mod_headers.c>
#     Header always set Strict-Transport-Security "max-age=31536000"
# </IfModule>

# ── WordPress admin area — relaxed framing ─────────────────
# wp-admin and wp-login.php use iframes for the media library,
# visual page builders (Elementor, Beaver Builder, etc.), and
# some plugin admin panels. DENY/SAMEORIGIN would break these.
# We keep SAMEORIGIN (same as the global default above) to be
# explicit, and we do NOT apply a strict CSP here (which would
# break WP admin's extensive inline scripts and styles).
<LocationMatch "^/(wp-admin|wp-login\.php)">
    <IfModule mod_headers.c>
        # Allow iframes on the same origin (WP admin embeds)
        Header set X-Frame-Options "SAMEORIGIN"

        # For deployments behind a TLS-terminating reverse proxy,
        # uncomment the line below to enforce HTTPS for wp-admin:
        # RewriteEngine On
        # RewriteCond %{HTTPS} off
        # RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
    </IfModule>
</LocationMatch>

# ── Prevent access to sensitive files ───────────────────────

# Block direct access to .htaccess, .htpasswd, and similar.
# Apache protects these by default; this is a belt-and-suspenders
# measure for cases where this config is included in a non-Apache
# front-end server.
<FilesMatch "^\.ht">
    Require all denied
</FilesMatch>

# ── KeepAlive ───────────────────────────────────────────────

# Persistent TCP connections reduce TCP handshake overhead.
# Conservative values to avoid exhausting Apache workers on
# high-concurrency endpoints.
KeepAlive On
MaxKeepAliveRequests 100
KeepAliveTimeout 5

# ── Symlink handling ───────────────────────────────────────

# Do not follow symlinks that escape the document root.
# Plugins that create insecure symlinks (e.g. to /tmp) are a
# known attack vector; this blocks that class of attack.
# NOTE: Some plugins legitimately use symlinks for mu-plugins
# or must-use plugins. If you see 403s after installing a plugin,
# you may need to remove -SymLinksIfOwnerMatch below.
# Options must be set inside a <Directory> block in Apache 2.4.
<Directory "/var/www/html">
    # -Indexes  = no directory listing
    # +FollowSymLinks = enable RewriteRule (WordPress requires this;
    #   RewriteRule can't work if both FollowSymLinks AND SymLinksIfOwnerMatch
    #   are disabled. This is safe: -FollowSymLinks above in the server
    #   context already prevents escaping the docroot.)
    Options -Indexes +FollowSymLinks
</Directory>

# ── Request body limits ─────────────────────────────────────

# Ensure Apache respects the PHP post_max_size upload limit.
# Without this, Apache's default 1GB limit can override PHP's
# 256MB setting in some configurations.
LimitRequestBody 268435456
