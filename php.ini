; ============================================================
; AppLabX WordPress Base — PHP Production Overrides
; ============================================================
; This file is loaded AFTER the official WordPress image's
; php.ini defaults (via PHP_INI_DIR/conf.d/).
; All values here are production-safe and WordPress-compatible.
; ============================================================

; ── Memory & Execution ─────────────────────────────────────

; Maximum amount of memory a script may consume.
; 512 MB is ample for most WordPress sites with a handful of
; plugins. Increase for memory-intensive operations (large
; imports, image processing without a dedicated worker).
memory_limit = 512M

; Maximum execution time of each script, in seconds.
; 300 s = 5 minutes. Required for long-running WP-CLI imports,
; large theme/plugin installs, and bulk operations.
max_execution_time = 300

; Maximum amount of time each script may spend parsing request
; data (POST, GET, file uploads). Keep in sync with
; max_execution_time.
max_input_time = 300

; Maximum number of input variables (POST, GET, cookies) that
; PHP will parse. 5000 handles large forms and admin POST
; requests with many fields without triggering truncated saves.
max_input_vars = 5000

; ── File uploads ────────────────────────────────────────────

; Maximum size of an uploaded file.
upload_max_filesize = 256M

; Maximum size of POST data that PHP will accept.
post_max_size = 256M

; Maximum number of files that can be uploaded in a single
; request. Default 20 is too low for bulk media uploads.
max_file_uploads = 100

; ── Error handling ─────────────────────────────────────────

; Never expose PHP errors to end users in production.
display_errors = Off

; Log errors to the web server error log rather than stdout.
; The official WordPress image routes Apache logs to stdout,
; so PHP error logs also end up in `docker logs`.
log_errors = On

; Never show PHP version in HTTP Server header.
expose_php = Off

; Report all errors except notices and strict standards.
; notices are noise in production; strict is for dev only.
error_reporting = E_ALL & ~E_NOTICE & ~E_STRICT & ~E_DEPRECATED

; ── Timezone ───────────────────────────────────────────────
; Set to a real timezone to avoid PHP timezone warnings in
; WordPress and ensure correct scheduled-post timing.
date.timezone = Asia/Singapore

; ── Sessions ───────────────────────────────────────────────
; File-based sessions (default) are fine for single-container
; deployments. For multi-container (K8s), use Redis-backed sessions.
; WordPress object caching via Redis is preferred; sessions are a
; fallback.
session.save_handler = files
session.save_path = /tmp
session.gc_maxlifetime = 86400
session.cookie_httponly = On
; Note: session.cookie_secure is intentionally left as the PHP
; default (Off). Forcing it On breaks logins over HTTP, including
; local development and TLS-terminating proxies. Enable it in your
; downstream docker-compose/Coolify via:
;   PHP_SESSION_COOKIE_SECURE=On
; or mount a custom php.ini that overrides this value.
session.use_strict_mode = On

; ── OPcache (see also opcache.ini) ─────────────────────────
; The official WordPress image enables OPcache by default;
; opcache.ini contains the full tuned configuration.

; ── Realpath cache ──────────────────────────────────────────

; Cache the results of realpath() lookups to reduce syscalls.
; 4096 K is a good middle ground; increase for sites with
; thousands of files (complex theme + plugin stacks).
realpath_cache_size = 4096K
realpath_cache_ttl = 600

; ── WordPress-specific tweaks ──────────────────────────────

; IMPORTANT: Do NOT disable PHP functions here.
; WordPress core and popular plugins (WooCommerce, Yoast, Jetpack,
; WP-CLI, image editors, backup tools) depend on exec(), shell_exec(),
; proc_open(), passthru(), and system(). Disabling them will cause
; silent failures and broken functionality across the ecosystem.
;
; Security in this image comes from:
;   - Non-root container user (wordpress:apache image runs as www-data)
;   - read-only filesystem where possible (Coolify supports this)
;   - Network isolation via Coolify's built-in firewall
;   - Plugin/theme code auditing (deploy-time dependency scanning)
disable_functions =

; ── Uploads directory ──────────────────────────────────────
; WordPress will create this at runtime; the path is here for
; reference and for any PHP-internal use before WP init.
; upload_tmp_dir = /var/www/html/wp-content/uploads

; ── Logging ────────────────────────────────────────────────

; Where PHP errors are written (relative to the Apache
; DocumentRoot at runtime).
; error_log = php_errors.log
