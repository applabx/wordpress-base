; ============================================================
; AppLabX WordPress Base — OPcache Configuration
; ============================================================
; OPcache is the single highest-impact PHP performance setting.
; These values are tuned for medium-sized production WordPress
; sites (≈ 100–10 000 visits/day per container).
;
; Philosophy: stability and compatibility over marginal perf gains.
; OPcache is mandatory; JIT is not — WordPress workloads are
; I/O-bound (database + filesystem), not CPU-bound, so JIT's
; CPU-optimisation benefits rarely materialise while its segfault
; risk applies to every single request.
;
; Key knobs:
;   memory_consumption    — MB of shared memory for bytecode cache.
;                           256 MB handles virtually any WP install.
;   max_accelerated_files — max scripts kept cached. 100 000 covers
;                           WordPress core + 30+ plugins + a large
;                           theme without eviction pressure.
;   validate_timestamps   — MUST be 0 (Off) in production. Enabling
;                           it adds a stat() syscall on every request,
;                           defeating the cache entirely.
;   revalidate_freq       — companion to validate_timestamps.
;                           Set to 0 when validate_timestamps is Off.
;
; After a code deploy, clear the cache via:
;   wp cache flush --allow-root
; or, without WP-CLI, touch any .php file under /var/www/html/ or
; restart the container.
; ============================================================

; ── Memory ─────────────────────────────────────────────────

; Shared memory allocated for compiled bytecode. 256 MB is more
; than sufficient for virtually any WordPress installation.
; Monitor actual usage with:
;   docker exec <container> wp --allow-root eval 'echo ini_get("opcache.memory_allocated");'
; Increase to 512 MB only if opcache.memory_allocated / opcache.memory_consumption
; consistently exceeds 90 %.
opcache.memory_consumption = 256

; ── Cached files ───────────────────────────────────────────

; Maximum number of scripts in the cache. The actual ceiling is
; this value rounded up to the nearest prime (≈ 100 000 → 100 003).
; This covers WordPress core + dozens of plugins + a large theme
; with no evictions under normal operation.
opcache.max_accelerated_files = 100000

; ── Timestamp validation ────────────────────────────────────

; NEVER enable timestamp checking in production.
; validate_timestamps=1 causes a stat() syscall on every PHP file
; for every request, destroying cache hit performance.
opcache.validate_timestamps = 0

; How often to check for file changes (seconds). Meaningless when
; validate_timestamps is 0 (above). Set to 2 briefly after a
; deploy, then back to 0.
opcache.revalidate_freq = 0

; ── Optimisation level ──────────────────────────────────────

; Bitmask of optimisation passes.
; 0x7FFFBFFF is the default (all passes except file-only
; optimisations). Safe for WordPress and reduces memory usage.
opcache.optimization_level = 0x7FFFBFFF

; ── Interned strings ─────────────────────────────────────────

; Memory for deduplicating repeated string literals in compiled
; code. 32 MB handles virtually every WordPress install.
opcache.interned_strings_buffer = 32

; ── Crash protection (PHP 7.x only) ─────────────────────────
; REMOVED: opcache.enable_crash_override is deprecated in PHP 8.0+
; and has no effect. It was a PHP 7.x feature for OOM recovery.

; ── Preloading ───────────────────────────────────────────────
; Preload hot files (WordPress core + must-use plugins) at
; startup for zero-latency first requests.
; To enable, create a preload script and uncomment below:
;   # preload.php — list files to compile and cache:
;   <?php
;   foreach (glob('/var/www/html/wp-content/mu-plugins/*.php') as $file) {
;       if (opcache_compile_file($file)) { continue; }
;   }
;   opcache_compile_file('/var/www/html/wp-settings.php');
; opcache.preload = /usr/local/bin/preload.php
; opcache.preload_user = www-data

; ── JIT — DISABLED ──────────────────────────────────────────
;
; JIT is intentionally disabled for this base image.
;
; JIT (Just-In-Time compilation) translates PHP bytecode to native
; machine code at runtime. It provides measurable speedups for
; CPU-bound workloads (number crunching, image processing, etc.)
; but WordPress is I/O-bound — the bottleneck is the database
; query and filesystem read, not CPU instruction execution.
;
; Enabling JIT on an I/O-bound workload provides negligible
; benefit while adding real risk:
;   - JIT compiler bugs have caused intermittent segfaults with
;     popular plugins (e.g. Jetpack, WooCommerce, Yoast)
;   - JIT memory consumption competes with OPcache bytecode cache
;   - Debugging JIT-induced crashes is extremely difficult
;     (no PHP stack trace; pure SIGSEGV)
;   - JIT warm-up latency on cold starts adds unpredictable delays
;
; If your downstream project genuinely benefits from JIT (profiled
; benchmarks showing >20% CPU improvement), override in a downstream
; php.ini or Coolify env var:
;   PHP_OPCACHE_JIT_BUFFER_SIZE=128M
;   PHP_OPCACHE_JIT=tracing
; Always test JIT under realistic load before enabling in prod.

; ── Diagnostics (uncomment to tune) ─────────────────────────
; opcache.log_verbosity_level = 4
; opcache.output_filename = /tmp/opcache-log

; ── Always-on guard ─────────────────────────────────────────
; OPcache must be enabled. This is the default in the base image;
; we assert it here as a safety net.
opcache.enable = 1
