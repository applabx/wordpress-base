; ============================================================
; AppLabX WordPress Base — OPcache Configuration
; ============================================================
; OPcache is the most impactful single PHP performance knob.
; These settings are tuned for medium-sized production WordPress
; sites (roughly 100–10 000 visits/day per container).
;
; Key concepts:
;   opcache.memory_consumption  — MB of RAM reserved for cached
;                                 compiled scripts. 256 MB is
;                                 plenty for most WP stacks.
;   opcache.max_accelerated_files — maximum number of scripts
;                                 kept in the cache. 100 000
;                                 covers all core + popular
;                                 plugins + a large theme.
;   opcache.validate_timestamps  — MUST be Off in production.
;                                 Enabling it defeats caching and
;                                 adds stat() syscalls on every
;                                 request.  Use php-version's
;                                 restart trigger (opcache
;                                 revalidate_path) after deploys.
; ============================================================

; ── Memory ─────────────────────────────────────────────────

; How much shared memory to allocate for the OPcache.
; 256 MB handles themes with hundreds of files + 20–30 plugins.
; Increase to 512 MB for very large stacks; monitor with
; opcache.memory_allocated via phpinfo().
opcache.memory_consumption = 256

; ── Cached files ───────────────────────────────────────────

; Maximum number of files that can be in the OPcache.
; The actual maximum is this value rounded up to the nearest
; prime. 100 000 ≈ 96 640 (next prime), which covers virtually
; every WordPress installation including major plugins (WooCommerce,
; Yoast, Jetpack, Elementor, etc.).
opcache.max_accelerated_files = 100000

; ── Performance ───────────────────────────────────────────

; How often OPcache checks for file modifications (in seconds).
; 0 = never (production). Set to 0 ONLY when
; opcache.validate_timestamps = Off.
; Changing this to a non-zero value automatically enables
; timestamp validation — useful during deployments.
opcache.revalidate_freq = 0

; Never re-validate timestamps (required for production perf).
; After a code deployment, either:
;   (a) Set this to 2, wait 10 s, set back to 0, OR
;   (b) Use opcache_reset() in a deploy hook / wp-cli command.
opcache.validate_timestamps = 0

; Save memory by skipping the creation of hash tables for
; files that are identical on every request (comments, empty
; lines, whitespace).  Safe for WordPress.
opcache.optimization_level = 0x7FFFBFFF

; ── Interned strings ──────────────────────────────────────

; Memory for interned strings (repeated string values in
; compiled code).  32 MB is sufficient for most WP sites.
opcache.interned_strings_buffer = 32

; ── Fast shutdown ─────────────────────────────────────────

; Use a fast memory shutdown sequence instead of the
; virtual destructor.  Reduces request latency slightly.
opcache.fast_shutdown = 1

; ── Crash protection ──────────────────────────────────────

; Prevent OPcache from serving stale / corrupted bytecode
; after a failed php-fpm restart or an OOM kill.
opcache.enable_crash_override = 0

; ── File discovery ─────────────────────────────────────────

; Preload the OPcache with files from this path at startup.
; Useful for persistent "hot" files (core + must-use plugins).
; Format: absolute path to a PHP script that calls opcache_compile_file().
; Uncomment and customise for your deployment:
; opcache.preload = /usr/local/bin/opcache-preload.php
; opcache.preload_user = www-data

; ── Restrict visibility ─────────────────────────────────────

; Do not expose OPcache status via phpinfo() or opcache_get_status().
; Prevents information leakage about your file structure.
opcache.restrict_api =

; ── JIT (PHP 8+) ───────────────────────────────────────────

; Enable the JIT compiler for CPU-intensive workloads.
; "function" mode is sufficient for most WordPress workloads.
; Switch to "tracing" for compute-heavy plugins / custom code.
opcache.jit_buffer_size = 128M
opcache.jit = function

; ── Diagnostics (comment out in production) ─────────────────
; Uncomment to write OPcache stats to a file during tuning:
; opcache.log_verbosity_level = 4
; opcache.output_filename = /tmp/opcache-log

; ── Always-on guard ───────────────────────────────────────
; Ensure OPcache cannot be accidentally disabled at runtime.
opcache.enable = 1
